<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="galleryEDIT.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-image: url(content/leaves.png);
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* ── Masonry grid ── */
    .masonry-grid {
      column-count: 5;
      column-gap: 10px;
      padding: 10px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .masonry-item img {
      width: 100%;
      display: block;
      opacity: 0.85;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .masonry-item img:hover {
      opacity: 1;
      transform: scale(1.02);
    }

    /* ── Lightbox overlay ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
      cursor: pointer;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      cursor: default;
    }

    #lightbox-inner img {
      max-width: 90vw;
      max-height: 80vh;
      display: block;
      object-fit: contain;
    }

    #lightbox-caption {
      color: #fff;
      font-size: 15px;
      margin-top: 12px;
      line-height: 1.5;
      max-width: 90vw;
      font-family: Georgia, serif;
      font-style: italic;
      text-align: left;
    }

    #lightbox-close {
      position: absolute;
      top: -36px;
      right: 0;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      user-select: none;
    }

    #lightbox-close:hover { color: #ccc; }

    /* ── Responsive ── */
    @media (max-width: 1100px) { .masonry-grid { column-count: 4; } }
    @media (max-width: 800px)  { .masonry-grid { column-count: 3; } }
    @media (max-width: 500px)  { .masonry-grid { column-count: 2; } }
  </style>
</head>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox(event)">
    <div id="lightbox-inner">
      <span id="lightbox-close" onclick="closeLightboxDirect()">&times;</span>
      <img id="lightbox-img" src="" alt="">
      <div id="lightbox-caption"></div>
    </div>
  </div>

  <script>
    function openLightbox(img) {
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox-caption').textContent = img.alt;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      // close only if clicking the dark backdrop, not the image/caption
      if (e.target === document.getElementById('lightbox')) {
        closeLightboxDirect();
      }
    }

    function closeLightboxDirect() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightboxDirect();
    });
  </script>
